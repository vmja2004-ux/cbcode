<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 轉 CSV 批次轉換器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .drop-zone { transition: all 0.3s ease; }
        .drop-zone.drag-over { border-color: #3b82f6; background-color: #eff6ff; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Excel 轉 CSV 批次轉換器</h1>
            <p class="text-gray-600">快速將 .xlsx 檔案轉換為 UTF-8 格式的 CSV（逗號分隔）</p>
            <p class="text-xs text-gray-400 mt-1">所有處理皆在本地完成，您的檔案不會被上傳到任何伺服器</p>
        </div>

        <!-- Main Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <!-- Drop Zone -->
            <div id="dropZone" class="drop-zone border-2 border-dashed border-gray-300 m-6 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400">
                <input type="file" id="fileInput" multiple accept=".xlsx, .xls" class="hidden">
                <div class="flex flex-col items-center">
                    <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-700">點擊或拖放 Excel 檔案至此</p>
                    <p class="text-sm text-gray-500 mt-1">支援批次處理多個 .xlsx 檔案</p>
                </div>
            </div>

            <!-- Action Buttons (Hidden by default) -->
            <div id="actionArea" class="hidden px-6 pb-6 flex justify-between items-center">
                <span id="fileCount" class="text-sm text-gray-600 font-medium">已選擇 0 個檔案</span>
                <div class="space-x-2">
                    <button id="clearBtn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-red-600 transition-colors">全部清除</button>
                    <button id="convertBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 shadow-sm transition-all">開始批次轉換</button>
                </div>
            </div>

            <!-- File List -->
            <div id="fileList" class="divide-y divide-gray-100 border-t border-gray-100 hidden">
                <!-- List items will be injected here -->
            </div>
        </div>

        <!-- Instructions -->
        <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-4 bg-white rounded-xl border border-gray-100">
                <h3 class="font-semibold text-gray-800 mb-2 flex items-center">
                    <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xs mr-2">1</span>
                    UTF-8 編碼
                </h3>
                <p class="text-sm text-gray-500">輸出的 CSV 使用 UTF-8 (帶 BOM) 編碼，確保繁體中文與特殊符號在 Excel 開啟時不亂碼。</p>
            </div>
            <div class="p-4 bg-white rounded-xl border border-gray-100">
                <h3 class="font-semibold text-gray-800 mb-2 flex items-center">
                    <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xs mr-2">2</span>
                    逗號分隔
                </h3>
                <p class="text-sm text-gray-500">採用標準的逗號（Comma）作為分隔符號，符合通用資料交換格式。</p>
            </div>
            <div class="p-4 bg-white rounded-xl border border-gray-100">
                <h3 class="font-semibold text-gray-800 mb-2 flex items-center">
                    <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-xs mr-2">3</span>
                    多頁籤處理
                </h3>
                <p class="text-sm text-gray-500">預設轉換活頁簿中的「第一個工作表」。若有特殊需求，可後續擴充選擇特定頁籤。</p>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const actionArea = document.getElementById('actionArea');
        const fileCountDisplay = document.getElementById('fileCount');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');

        let selectedFiles = [];

        // --- Event Listeners ---

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            handleFiles(e.dataTransfer.files);
        });

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            updateUI();
        });

        convertBtn.addEventListener('click', () => {
            processBatch();
        });

        // --- Core Functions ---

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(f => 
                f.name.endsWith('.xlsx') || f.name.endsWith('.xls')
            );
            
            if (newFiles.length === 0) return;

            newFiles.forEach(file => {
                selectedFiles.push({
                    file: file,
                    id: Math.random().toString(36).substr(2, 9),
                    status: 'pending', // pending, processing, completed, error
                    resultUrl: null
                });
            });

            updateUI();
        }

        function updateUI() {
            if (selectedFiles.length > 0) {
                actionArea.classList.remove('hidden');
                fileList.classList.remove('hidden');
            } else {
                actionArea.classList.add('hidden');
                fileList.classList.add('hidden');
            }

            fileCountDisplay.innerText = `已選擇 ${selectedFiles.length} 個檔案`;
            
            fileList.innerHTML = '';
            selectedFiles.forEach(item => {
                const div = document.createElement('div');
                div.className = 'px-6 py-4 flex items-center justify-between hover:bg-gray-50 transition-colors';
                
                let statusBadge = '';
                if (item.status === 'pending') {
                    statusBadge = '<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">待處理</span>';
                } else if (item.status === 'processing') {
                    statusBadge = '<span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded animate-pulse">轉換中...</span>';
                } else if (item.status === 'completed') {
                    statusBadge = '<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">已完成</span>';
                } else if (item.status === 'error') {
                    statusBadge = '<span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded">錯誤</span>';
                }

                div.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="p-2 bg-green-50 rounded-lg">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-900 truncate max-w-xs md:max-w-md">${item.file.name}</p>
                            <div class="mt-1 flex items-center space-x-2">
                                <span class="text-xs text-gray-400">${(item.file.size / 1024).toFixed(1)} KB</span>
                                ${statusBadge}
                            </div>
                        </div>
                    </div>
                    <div>
                        ${item.status === 'completed' ? `
                            <button onclick="downloadFile('${item.id}')" class="text-blue-600 hover:text-blue-800 text-sm font-semibold flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                下載 CSV
                            </button>
                        ` : ''}
                    </div>
                `;
                fileList.appendChild(div);
            });
        }

        async function processBatch() {
            convertBtn.disabled = true;
            convertBtn.innerText = '處理中...';

            for (let item of selectedFiles) {
                if (item.status === 'completed') continue;
                
                item.status = 'processing';
                updateUI();

                try {
                    const csvContent = await convertToCsv(item.file);
                    const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
                    item.resultUrl = URL.createObjectURL(blob);
                    item.status = 'completed';
                } catch (err) {
                    console.error(err);
                    item.status = 'error';
                }
                updateUI();
            }

            convertBtn.disabled = false;
            convertBtn.innerText = '開始批次轉換';
            
            showSuccessNotification();
        }

        function convertToCsv(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        
                        // 取得第一個工作表名稱
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        
                        // 轉換為 CSV (逗號分隔)
                        const csv = XLSX.utils.sheet_to_csv(worksheet, {
                            FS: ',', // 欄位分隔符號
                            RS: '\n' // 換行符號
                        });
                        
                        resolve(csv);
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        }

        window.downloadFile = (id) => {
            const item = selectedFiles.find(i => i.id === id);
            if (!item || !item.resultUrl) return;

            const link = document.createElement('a');
            link.href = item.resultUrl;
            link.download = item.file.name.replace(/\.[^/.]+$/, "") + ".csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function showSuccessNotification() {
            // 可以在此添加簡單的 Toast 提示
            console.log('轉換完成');
        }
    </script>
</body>
</html>
